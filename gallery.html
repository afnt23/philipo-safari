  <script>
    // Mobile menu
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
      document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
    });
    mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      hamburger.classList.remove('open'); mobileMenu.classList.remove('open'); document.body.style.overflow = '';
    }));

    // Filter
    const filterBtns = document.querySelectorAll('.filter-btn');
    const thumbs = document.querySelectorAll('.gallery-thumb');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        thumbs.forEach(t => {
          t.style.display = (filter === 'all' || t.dataset.cat === filter) ? 'block' : 'none';
        });
        updateVisible();
      });
    });

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    let visibleThumbs = [];
    let currentIdx = 0;

    function updateVisible() {
      visibleThumbs = [...document.querySelectorAll('.gallery-thumb')]
        .filter(t => t.style.display !== 'none');
    }
    updateVisible();

    function openLightbox(idx) {
      currentIdx = idx;
      lbImg.src = visibleThumbs[idx].querySelector('img').src;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    thumbs.forEach((thumb, i) => {
      thumb.addEventListener('click', () => {
        updateVisible();
        const idx = visibleThumbs.indexOf(thumb);
        if (idx !== -1) openLightbox(idx);
      });
    });

    document.getElementById('lb-close').addEventListener('click', () => {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    });

    document.getElementById('lb-prev').addEventListener('click', () => {
      currentIdx = (currentIdx - 1 + visibleThumbs.length) % visibleThumbs.length;
      lbImg.src = visibleThumbs[currentIdx].querySelector('img').src;
    });

    document.getElementById('lb-next').addEventListener('click', () => {
      currentIdx = (currentIdx + 1) % visibleThumbs.length;
      lbImg.src = visibleThumbs[currentIdx].querySelector('img').src;
    });

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) { lightbox.classList.remove('open'); document.body.style.overflow = ''; }
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') { lightbox.classList.remove('open'); document.body.style.overflow = ''; }
      if (e.key === 'ArrowLeft') { currentIdx = (currentIdx - 1 + visibleThumbs.length) % visibleThumbs.length; lbImg.src = visibleThumbs[currentIdx].querySelector('img').src; }
      if (e.key === 'ArrowRight') { currentIdx = (currentIdx + 1) % visibleThumbs.length; lbImg.src = visibleThumbs[currentIdx].querySelector('img').src; }
    });
  </script>
